<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; media-src 'self' blob:; img-src 'self' data: blob:; connect-src 'self' blob:"
    />
    <title>Tracks</title>
  </head>
  <body>
    <div class="settings-overlay" id="settings-overlay" hidden>
      <div class="settings-panel">
        <div class="settings-header">
          <span class="settings-title">Paramètres</span>
          <button class="settings-close" id="settings-close">&#x2715;</button>
        </div>
        <div class="settings-main">
          <nav class="settings-tabs">
            <button class="settings-tab is-active" data-tab="general">Général</button>
            <button class="settings-tab" data-tab="tags">Tags profil</button>
            <button class="settings-tab" data-tab="llm">LLM</button>
            <button class="settings-tab" data-tab="engine-dj">Engine DJ</button>
          </nav>
          <div class="settings-body">
            <div class="settings-page is-active" data-page="general">
              <div class="settings-field">
                <label class="settings-label" for="input-library-folder">Library Folder</label>
                <div class="settings-path-row">
                  <input class="settings-input" id="input-library-folder" type="text" placeholder="Aucun dossier sélectionné" spellcheck="false" readonly />
                  <button class="dialog-btn dialog-btn--primary settings-browse" id="btn-browse-library">Parcourir</button>
                </div>
              </div>
            </div>
            <div class="settings-page" data-page="tags">
              <p class="settings-hint">
                Axes reconnus (ex. <code>groove</code>, <code>Groove</code>) ou <strong>tag personnalisé</strong> : minuscules, chiffres, tirets de soulignement, 1–32 car. (ex. <code>mon_mood</code>, <code>My Vibe</code>). Puis <strong>Ajouter</strong> ou <kbd>Entrée</kbd>. L’ordre = affichage. Liste vide enregistrée = 12 axes par défaut.
              </p>
              <ul class="settings-profile-tags-list" id="settings-profile-tags-list" aria-label="Tags profil affichés"></ul>
              <div class="settings-field settings-profile-tags-add">
                <label class="settings-label" for="settings-profile-tag-add">Ajouter un critère</label>
                <div class="settings-profile-tags-add-row">
                  <input
                    class="settings-input"
                    id="settings-profile-tag-add"
                    type="text"
                    spellcheck="false"
                    list="settings-profile-tag-suggestions"
                    placeholder="Identifiant ou nom (ex. energy, Energy, groove…)"
                    autocomplete="off"
                  />
                  <button type="button" class="dialog-btn dialog-btn--primary" id="btn-profile-tag-add">Ajouter</button>
                </div>
                <p class="settings-field-error" id="settings-profile-tag-add-error" hidden></p>
                <datalist id="settings-profile-tag-suggestions"></datalist>
              </div>
            </div>
            <div class="settings-page" data-page="engine-dj">
              <div class="settings-field">
                <label class="settings-label" for="input-engine-dj-db">database path</label>
                <input class="settings-input" id="input-engine-dj-db" type="text" spellcheck="false" placeholder="J:\m.db" />
              </div>
            </div>
            <div class="settings-page" data-page="llm">
              <div class="settings-field">
                <label class="settings-label" for="input-openai-key">Clé API OpenAI</label>
                <input class="settings-input" id="input-openai-key" type="password" placeholder="sk-..." spellcheck="false" />
              </div>
              <div class="settings-field">
                <label class="settings-label" for="input-genre-prompt">Retrieve Genre Prompt</label>
                <textarea class="settings-textarea" id="input-genre-prompt" rows="6" spellcheck="false" placeholder="Ex: Based on the artist and title, return the music genre..."></textarea>
              </div>
            </div>
          </div>
        </div>
        <div class="settings-footer">
          <button class="dialog-btn" id="settings-cancel">Annuler</button>
          <button class="dialog-btn dialog-btn--primary" id="settings-save">Enregistrer</button>
        </div>
      </div>
    </div>

    <div id="app">
      <header class="titlebar">
        <span class="titlebar__title">Tracks</span>
        <div class="titlebar__controls">
          <button id="btn-settings" aria-label="Paramètres" title="Paramètres">&#x2699;</button>
          <button id="btn-minimize" aria-label="Réduire">&#x2013;</button>
          <button id="btn-maximize" aria-label="Agrandir">&#x25A1;</button>
          <button id="btn-close" aria-label="Fermer">&#x2715;</button>
        </div>
      </header>

      <div class="panels">
        <div class="panel panel--tabbed">
          <nav class="panel-tabs">
            <button class="panel-tabs__btn is-active" data-panel-tab="folders">Folders</button>
            <button class="panel-tabs__btn" data-panel-tab="playlists">Playlists</button>
          </nav>
          <div class="panel-tab-page is-active" data-panel-page="folders" id="panel-left"></div>
          <div class="panel-tab-page" data-panel-page="playlists" id="panel-playlists"></div>
        </div>
        <div class="panel-divider"></div>
        <div class="panel" id="panel-right"></div>
      </div>

      <div class="player-section" id="player-section"></div>
    </div>
    <script type="module" src="./index.ts"></script>
  </body>
</html>
